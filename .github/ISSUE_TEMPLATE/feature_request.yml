name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or limitation you're running into
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've tried

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - TUI / interface
        - Agent / reasoning
        - Tools (bash, read, write, edit…)
        - Security / permissions
        - Providers / models
        - Skills
        - HTTP API
        - MCP integration
        - Performance
        - Documentation
        - Other
    validations:
      required: true
