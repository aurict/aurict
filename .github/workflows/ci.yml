name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    env:
      HOME: ${{ runner.temp }}/aurict-home
      AURICT_SNAPSHOT_DIR: ${{ runner.temp }}/aurict-snapshots

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck core
        run: bunx tsc -p packages/core/tsconfig.json --noEmit

      - name: Typecheck cli
        run: bunx tsc -p packages/cli/tsconfig.json --noEmit

      - name: Run core tests
        run: bun test packages/core/test/ --timeout 30000

      - name: Run cli tests
        run: bun test packages/cli/test/ --timeout 30000

      - name: Run eval smoke
        run: bun run eval -- --smoke

      - name: Build platform binaries
        run: bun run scripts/build-all.ts

      - name: Smoke test packaged linux binary
        run: ./dist/aurict-linux-x64 --version

      - name: Dry-run npm wrapper packages
        run: |
          cd packages/cli
          npm pack --dry-run
          cd ../aurict
          npm pack --dry-run
